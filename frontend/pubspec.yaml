name: pixelspark
description: "Professional AI-powered offline image editor"
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  tflite_flutter: ^0.12.1
  image: ^4.1.7
  image_picker: ^1.0.7
  image_gallery_saver: ^2.0.3
  crop_your_image: ^1.1.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.3
  ffi: ^2.1.3
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1E3A5F"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/icon/

dependency_overrides:
  collection: ">=1.19.0 <2.0.0"
  meta: ">=1.15.0 <2.0.0"
  path: ">=1.9.0 <2.0.0"
